<!DOCTYPE html>
<html>
<head>
    <title>CSV Table Example</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 20px;
        }

        th {
            background: #444;
            color: white;
            padding: 12px;
            text-align: left;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f1f1f1;
        }
    </style>
</head>

<body>

    <h1>Product Inventory</h1>

    <table id="csvTable">
        <thead></thead>
        <tbody></tbody>
    </table>

<script>
fetch('data.csv')
    .then(response => response.text())
    .then(csv => {

        const rows = csv.trim().split('\n');

        const headers = rows[0].split(',');

        const thead =
            document.querySelector('#csvTable thead');

        const tbody =
            document.querySelector('#csvTable tbody');

        // Create Header Row
        let headerRow = '<tr>';

        headers.forEach(header => {
            headerRow += `<th>${header}</th>`;
        });

        headerRow += '</tr>';

        thead.innerHTML = headerRow;

        // Create Data Rows
        for (let i = 1; i < rows.length; i++) {

            const columns = rows[i].split(',');

            let rowHTML = '<tr>';

            columns.forEach(column => {
                rowHTML += `<td>${column}</td>`;
            });

            rowHTML += '</tr>';

            tbody.innerHTML += rowHTML;
        }
    })
    .catch(error => {
        alert('Error loading CSV:' + error);
    });
</script>

</body>
</html>
